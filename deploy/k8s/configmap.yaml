apiVersion: v1
kind: ConfigMap
metadata:
  name: queuestorm-config
  namespace: queuestorm
data:
  APP_ENV: "production"
  SERVICE_NAME: "queuestorm-investigator"
  AUTH_REQUIRED: "true"
  RATE_LIMIT_ENABLED: "true"
  CACHE_BACKEND: "redis"
  EVIDENCE_SHARD_COUNT: "16"
  GATEWAY_REPLICA_COUNT: "3"
  TICKET_REPLICA_COUNT: "3"
  EVIDENCE_REPLICA_COUNT: "4"
  INVESTIGATION_REPLICA_COUNT: "3"
  NLG_REPLICA_COUNT: "2"
