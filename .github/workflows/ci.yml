name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke test import
        run: python -c "from app.main import app; print('Import OK')"

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t queuestorm-investigator:ci .

      - name: Health check via Docker
        run: |
          docker run -d --name qs -p 8000:8000 queuestorm-investigator:ci
          sleep 5
          curl --retry 5 --retry-delay 2 --fail http://localhost:8000/health
          docker stop qs
